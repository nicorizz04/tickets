<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Ticket Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: { DEFAULT: '#7B9669', light: '#BAC8B1', dark: '#404E3B' },
            secondary: '#6C8480',
            jade: { light: '#E6E6E6', muted: '#BAC8B1', forest: '#404E3B' }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gradient-to-br from-[#F5F7F3] to-[#E8EDE6] dark:from-[#2d3a2e] dark:to-[#404E3B] min-h-screen transition-colors duration-300 flex flex-col">
  <header class="bg-white/80 dark:bg-[#1f2620]/80 backdrop-blur-sm border-b border-primary/20 dark:border-primary/10 transition-colors duration-300">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <div>
        <div class="text-lg font-semibold text-gray-900 dark:text-white">Admin / Maintenance</div>
        <div class="text-sm text-gray-600 dark:text-gray-400">Change Status to In Progress / Completed</div>
      </div>
      <div class="flex items-center gap-4">
        <label class="relative inline-flex items-center cursor-pointer">
          <input id="dark-mode-toggle" type="checkbox" class="sr-only peer" />
          <div class="w-11 h-6 bg-primary/20 dark:bg-primary/40 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-primary/30 rounded-full peer transition-all duration-300 peer-checked:after:translate-x-5 after:content-[''] after:absolute after:top-0.5 after:left-0.5 after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all"></div>
        </label>
          <a href="index.html" class="text-sm text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white transition-colors">Back</a>
        <button id="logout-btn" class="hidden px-4 py-2 rounded-lg bg-primary hover:bg-primary/90 text-white text-sm transition-colors">Logout</button>
      </div>
    </div>
  </header>

  <main class="flex-1 flex items-center justify-center px-6 py-8">
    <section id="auth-section" class="w-full max-w-md">
      <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-lg dark:shadow-xl border border-gray-200 dark:border-gray-700 p-8">
        <div class="text-center mb-8">
          <div class="w-16 h-16 mx-auto mb-4 bg-secondary/10 dark:bg-secondary/20 rounded-full flex items-center justify-center">
            <span class="text-3xl">🔐</span>
          </div>
          <h2 class="text-2xl font-bold text-gray-900 dark:text-white">Admin Login</h2>
          <p class="text-sm text-gray-600 dark:text-gray-400 mt-2">Sign in with email and password</p>
        </div>

        <form id="login-form" class="space-y-4">
          <div>
            <label for="login-email" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Email</label>
            <input 
              id="login-email" 
              type="email" 
              required 
              placeholder="exemple@email.com"
              class="w-full px-4 py-2.5 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 dark:text-white rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all duration-300"
            />
          </div>

          <div>
            <label for="login-password" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Password</label>
            <input 
              id="login-password" 
              type="password" 
              required 
              placeholder="••••••••"
              class="w-full px-4 py-2.5 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 dark:text-white rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all duration-300"
            />
          </div>

          <button 
            type="submit"
            class="w-full mt-6 px-4 py-3 rounded-lg bg-gradient-to-r from-secondary to-secondary/80 hover:from-secondary/90 hover:to-secondary/70 text-white font-semibold transition-all duration-300 transform hover:scale-105 shadow-md hover:shadow-lg"
          >
            Login
          </button>
        </form>

        <div id="auth-message" class="mt-4 text-sm text-center"></div>

        <div class="mt-6 pt-6 border-t border-primary/20 dark:border-primary/10 text-center">
          <p class="text-sm text-gray-600 dark:text-gray-400">
            Not an admin? <a href="index.html" class="text-primary font-semibold hover:underline">Back</a>
          </p>
        </div>
      </div>
    </section>

    <section id="app-section" class="hidden w-full">
      <div class="max-w-6xl mx-auto">
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
          <div class="bg-white/60 dark:bg-[#3a4936]/60 backdrop-blur-sm rounded-xl shadow-sm border border-primary/20 dark:border-primary/10 p-5 transition-colors duration-300">
            <p class="text-sm font-medium text-primary/70 dark:text-primary/80 uppercase tracking-wide">Total</p>
          <p class="text-2xl font-bold text-primary mt-1" id="stat-total">0</p>
        </div>
        <div class="bg-white/60 dark:bg-[#3a4936]/60 backdrop-blur-sm rounded-xl shadow-sm border border-primary/20 dark:border-primary/10 p-5 transition-colors duration-300">
          <p class="text-sm font-medium text-primary/70 dark:text-primary/80 uppercase tracking-wide">Pending</p>
          <p class="text-2xl font-bold text-secondary dark:text-secondary mt-1" id="stat-pending">0</p>
        </div>
        <div class="bg-white/60 dark:bg-[#3a4936]/60 backdrop-blur-sm rounded-xl shadow-sm border border-primary/20 dark:border-primary/10 p-5 transition-colors duration-300">
          <p class="text-sm font-medium text-primary/70 dark:text-primary/80 uppercase tracking-wide">Completed</p>
          <p class="text-2xl font-bold text-primary dark:text-primary mt-1" id="stat-completed">0</p>
        </div>
      </div>

      <div class="flex items-center justify-between mt-8">
        <h2 class="text-lg font-semibold text-gray-900 dark:text-white">All Tickets</h2>
        <div class="flex items-center gap-2">
          <button class="sidebar-btn px-4 py-2 rounded-lg bg-primary/10 dark:bg-primary/20 hover:bg-primary/20 dark:hover:bg-primary/30 text-primary dark:text-primary text-sm transition-colors duration-300" data-filter="all">All</button>
          <button class="sidebar-btn px-4 py-2 rounded-lg bg-primary/10 dark:bg-primary/20 hover:bg-primary/20 dark:hover:bg-primary/30 text-primary dark:text-primary text-sm transition-colors duration-300" data-filter="hardware">Hardware</button>
          <button class="sidebar-btn px-4 py-2 rounded-lg bg-primary/10 dark:bg-primary/20 hover:bg-primary/20 dark:hover:bg-primary/30 text-primary dark:text-primary text-sm transition-colors duration-300" data-filter="software">Software</button>
        </div>
      </div>

      <div class="mt-4 bg-white/60 dark:bg-[#3a4936]/60 backdrop-blur-sm rounded-xl shadow-sm border border-primary/20 dark:border-primary/10 overflow-hidden transition-colors duration-300">
        <div class="overflow-x-auto">
          <table class="w-full text-left">
            <thead class="bg-primary/5 dark:bg-primary/10 border-b border-primary/20 dark:border-primary/10">
              <tr>
                <th class="px-6 py-4 text-xs font-semibold text-primary/70 dark:text-primary/80 uppercase tracking-wider">ID</th>
                <th class="px-6 py-4 text-xs font-semibold text-primary/70 dark:text-primary/80 uppercase tracking-wider">Description</th>
                <th class="px-6 py-4 text-xs font-semibold text-primary/70 dark:text-primary/80 uppercase tracking-wider">Category</th>
                <th class="px-6 py-4 text-xs font-semibold text-primary/70 dark:text-primary/80 uppercase tracking-wider">Status</th>
                <th class="px-6 py-4 text-xs font-semibold text-primary/70 dark:text-primary/80 uppercase tracking-wider cursor-pointer" id="th-priority">
                  Priority<span id="priority-sort-indicator" class="ml-1"></span>
                </th>
                <th class="px-6 py-4 text-xs font-semibold text-primary/70 dark:text-primary/80 uppercase tracking-wider">Date</th>
                <th class="px-6 py-4 text-xs font-semibold text-primary/70 dark:text-primary/80 uppercase tracking-wider">Actions</th>
              </tr>
            </thead>
            <tbody id="tickets-tbody" class="divide-y divide-primary/10 dark:divide-primary/5"></tbody>
          </table>
        </div>
      </div>
      </div>
    </section>
  </main>

  <script type="module" src="admin_page.js"></script>
  <script type="module">
    import { initDarkMode } from './theme.js';
    initDarkMode();
  </script>
</body>
</html>
