<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User - IT Tickets</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: { DEFAULT: '#7B9669', light: '#BAC8B1', dark: '#404E3B' },
            secondary: '#6C8480',
            jade: { light: '#E6E6E6', muted: '#BAC8B1', forest: '#404E3B' }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gradient-to-br from-[#F5F7F3] to-[#E8EDE6] dark:from-[#2d3a2e] dark:to-[#404E3B] min-h-screen transition-colors duration-300 flex flex-col">
  <header class="bg-white/80 dark:bg-[#1f2620]/80 backdrop-blur-sm border-b border-primary/20 dark:border-primary/10 transition-colors duration-300">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <div>
        <div class="text-lg font-semibold text-gray-900 dark:text-white">User Dashboard</div>
        <div class="text-sm text-gray-600 dark:text-gray-400">Create Tickets & Track Status</div>
      </div>
      <div class="flex items-center gap-4">
        <label class="relative inline-flex items-center cursor-pointer">
          <input id="dark-mode-toggle" type="checkbox" class="sr-only peer" />
          <div class="w-11 h-6 bg-primary/20 dark:bg-primary/40 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-primary/30 rounded-full peer transition-all duration-300 peer-checked:after:translate-x-5 after:content-[''] after:absolute after:top-0.5 after:left-0.5 after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all"></div>
        </label>
        <a href="index.html" class="text-sm text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white transition-colors">Back</a>
        <button id="logout-btn" class="hidden px-4 py-2 rounded-lg bg-primary hover:bg-primary/90 text-white text-sm transition-colors">Logout</button>
      </div>
    </div>
  </header>

  <main class="flex-1 flex items-center justify-center px-6 py-8">
    <section id="auth-section" class="w-full max-w-md">
      <div class="bg-white/60 dark:bg-[#3a4936]/60 backdrop-blur-sm rounded-2xl shadow-lg dark:shadow-xl border border-primary/20 dark:border-primary/10 p-8">
        <div class="text-center mb-8">
          <div class="w-16 h-16 mx-auto mb-4 bg-primary/10 dark:bg-primary/20 rounded-full flex items-center justify-center">
            <span class="text-3xl">👤</span>
          </div>
          <h2 class="text-2xl font-bold text-gray-900 dark:text-white">Connect User</h2>
          <p class="text-sm text-gray-600 dark:text-gray-400 mt-2">Log in with email and password</p>
        </div>

        <form id="login-form" class="space-y-4">
          <div>
            <label for="login-email" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Email</label>
            <input 
              id="login-email" 
              type="email" 
              required 
              placeholder="exemple@email.com"
              class="w-full px-4 py-2.5 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 dark:text-white rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all duration-300"
            />
          </div>

          <div>
            <label for="login-password" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Password</label>
            <input 
              id="login-password" 
              type="password" 
              required 
              placeholder="••••••••"
              class="w-full px-4 py-2.5 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 dark:text-white rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all duration-300"
            />
          </div>

          <button 
            type="submit"
            class="w-full mt-6 px-4 py-3 rounded-lg bg-gradient-to-r from-primary to-primary/80 hover:from-primary/90 hover:to-primary/70 text-white font-semibold transition-all duration-300 transform hover:scale-105 shadow-md hover:shadow-lg"
          >
            Connect
          </button>
        </form>

        <div id="auth-message" class="mt-4 text-sm text-center"></div>

        <div class="mt-6 pt-6 border-t border-primary/20 dark:border-primary/10 text-center">
          <p class="text-sm text-gray-600 dark:text-gray-400">
            Don't have an account? <a href="register.html?mode=user" class="text-primary font-semibold hover:underline">Create your account</a>
          </p>
        </div>
      </div>
    </section>

    <section id="app-section" class="hidden w-full">
      <div class="max-w-6xl mx-auto">
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
          <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 p-5 transition-colors duration-300">
            <p class="text-sm font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wide">Total</p>
            <p class="text-2xl font-bold text-primary mt-1" id="stat-total">0</p>
          </div>
        <div class="bg-white/60 dark:bg-[#3a4936]/60 backdrop-blur-sm rounded-xl shadow-sm border border-primary/20 dark:border-primary/10 p-5 transition-colors duration-300">
          <p class="text-sm font-medium text-primary/70 dark:text-primary/80 uppercase tracking-wide">Pending</p>
          <p class="text-2xl font-bold text-secondary mt-1" id="stat-pending">0</p>
        </div>
        <div class="bg-white/60 dark:bg-[#3a4936]/60 backdrop-blur-sm rounded-xl shadow-sm border border-primary/20 dark:border-primary/10 p-5">
          <p class="text-sm font-medium text-primary/70 dark:text-primary/80 uppercase tracking-wide">Completed</p>
          <p class="text-2xl font-bold text-primary mt-1" id="stat-completed">0</p>
        </div>
      </div>

      <div class="flex items-center justify-between mt-8">
        <h2 class="text-lg font-semibold text-gray-900 dark:text-white">My Tickets</h2>
        <button id="open-modal" class="px-5 py-2.5 bg-primary text-white font-medium rounded-lg shadow-sm hover:bg-primary-dark transition">
          Create New Ticket
        </button>
      </div>

      <div class="mt-4 bg-white/60 dark:bg-[#3a4936]/60 backdrop-blur-sm rounded-xl shadow-sm border border-primary/20 dark:border-primary/10 overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-left">
            <thead class="bg-primary/5 dark:bg-primary/10 border-b border-primary/20 dark:border-primary/10">
              <tr>
                <th class="px-6 py-4 text-xs font-semibold text-primary/70 dark:text-primary/80 uppercase tracking-wider">ID</th>
                <th class="px-6 py-4 text-xs font-semibold text-primary/70 dark:text-primary/80 uppercase tracking-wider">Description</th>
                <th class="px-6 py-4 text-xs font-semibold text-primary/70 dark:text-primary/80 uppercase tracking-wider">Category</th>
                <th class="px-6 py-4 text-xs font-semibold text-primary/70 dark:text-primary/80 uppercase tracking-wider">Status</th>
                <th class="px-6 py-4 text-xs font-semibold text-primary/70 dark:text-primary/80 uppercase tracking-wider">Priority</th>
                <th class="px-6 py-4 text-xs font-semibold text-primary/70 dark:text-primary/80 uppercase tracking-wider">Date</th>
              </tr>
            </thead>
            <tbody id="tickets-tbody" class="divide-y divide-primary/10 dark:divide-primary/5"></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <div id="modal" class="fixed inset-0 z-50 hidden">
  <div class="fixed inset-0 bg-black/30" id="modal-backdrop"></div>
  <div class="fixed inset-0 flex items-center justify-center p-4">
    <div class="bg-white/95 dark:bg-[#3a4936]/95 backdrop-blur-sm rounded-xl shadow-xl max-w-lg w-full max-h-[90vh] overflow-y-auto border border-primary/20 dark:border-primary/10">
      <div class="p-6 border-b border-primary/20 dark:border-primary/10">
        <h3 class="text-lg font-semibold text-gray-900 dark:text-white">Create New Ticket</h3>
      </div>
      <form id="ticket-form" class="p-6 space-y-4">
        <div>
          <label for="ticket-client-name" class="block text-sm font-medium text-gray-900 dark:text-white mb-1">Client Name / Company</label>
          <input type="text" id="ticket-client-name" name="client_name" placeholder="Your name or company name" required
                 class="w-full px-4 py-2 border border-primary/30 dark:border-primary/20 bg-white dark:bg-[#3a4936]/30 dark:text-white rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none">
        </div>

        <div>
          <label for="ticket-device-name" class="block text-sm font-medium text-gray-900 dark:text-white mb-1">Device</label>
          <input type="text" id="ticket-device-name" name="device_name" placeholder="Ex: Laptop Dell, Monitor LG"
                 class="w-full px-4 py-2 border border-primary/30 dark:border-primary/20 bg-white dark:bg-[#3a4936]/30 dark:text-white rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none">
        </div>
        
        <div>
          <label for="ticket-category" class="block text-sm font-medium text-gray-900 dark:text-white mb-1">Category</label>
          <select id="ticket-category" name="category"
                  class="w-full px-4 py-2 border border-primary/30 dark:border-primary/20 bg-white dark:bg-[#3a4936]/30 dark:text-white rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none">
            <option value="Software">Software</option>
            <option value="Hardware">Hardware</option>
          </select>
        </div>
        <div>
          <label for="ticket-priority" class="block text-sm font-medium text-gray-900 dark:text-white mb-1">Priority</label>
          <select id="ticket-priority" name="priority"
                  class="w-full px-4 py-2 border border-primary/30 dark:border-primary/20 bg-white dark:bg-[#3a4936]/30 dark:text-white rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none">
            <option value="Low">Low</option>
            <option value="Medium">Medium</option>
            <option value="High">High</option>
          </select>
        </div>
        <div>
          <label for="ticket-description" class="block text-sm font-medium text-gray-900 dark:text-white mb-1">Description</label>
          <textarea id="ticket-description" name="description" rows="4" placeholder="Details about the issue..."
                    class="w-full px-4 py-2 border border-primary/30 dark:border-primary/20 bg-white dark:bg-[#3a4936]/30 dark:text-white rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none resize-none"></textarea>
        </div>
        <div>
          <label for="ticket-image" class="block text-sm font-medium text-gray-900 dark:text-white mb-1">Image (optional)</label>
          <input type="file" id="ticket-image" name="image" accept="image/*"
                 class="w-full px-4 py-2 border border-primary/30 dark:border-primary/20 bg-white dark:bg-[#3a4936]/30 dark:text-white rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none">
          <p class="text-xs text-gray-500 mt-1">JPG, PNG, GIF - Max 5MB</p>
        </div>
      </form>
      <div class="p-6 border-t border-primary/20 dark:border-primary/10 flex justify-end gap-3">
        <button type="button" id="close-modal" class="px-4 py-2 text-gray-700 hover:bg-gray-100 rounded-lg transition">Cancel</button>
        <button type="button" id="submit-ticket" class="px-4 py-2 bg-primary text-white font-medium rounded-lg hover:bg-primary-dark transition">Save Ticket</button>
      </div>
    </div>
  </div>
</div>

  <script type="module">
    import { initDarkMode } from './theme.js';
    import('./user_page.js');
    initDarkMode();
  </script>
</body>
</html>
